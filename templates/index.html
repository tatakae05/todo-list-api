<!DOCTYPE html>
<html>
<head>
<title>Todo Verwaltung</title>
</head>

<body>

<h1>Meine Todo Listen</h1>


<form method="post" action="/create-list">

<input name="name"
placeholder="Neue Liste">

<button>
Erstellen
</button>

</form>


<hr>


{% for l in todo_lists %}

<h3>
<a href="/list/{{l.id}}">
{{l.name}}
</a>
</h3>


<a href="/delete-list/{{l.id}}">
Löschen
</a>


{% else %}

<p>Noch keine Listen vorhanden</p>

{% endfor %}


</body>
</html>
