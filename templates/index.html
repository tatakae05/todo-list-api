<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Verwaltung</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="page-head">
  <h1>Todo-Listen</h1>
</header>

<form class="entry-form" method="post" action="/create-list">
  <input name="name" placeholder="Name der neuen Liste" required>
  <button class="btn" type="submit">Liste anlegen</button>
</form>

<div class="card-stack">
{% for l in todo_lists %}
  <div class="index-card">
    <a class="card-title" href="/list/{{ l.id }}">{{ l.name }}</a>
    <a class="delete-link" href="/delete-list/{{ l.id }}">Löschen</a>
  </div>
{% else %}
  <p class="empty-note">Noch keine Listen vorhanden — oben eine anlegen.</p>
{% endfor %}
</div>

</body>
</html>
